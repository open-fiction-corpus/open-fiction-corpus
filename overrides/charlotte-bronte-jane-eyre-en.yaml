corrections:
  - find: "_ILLUSTRATED BY F. H. TOWNSEND_\n\nLondon SERVICE & PATON 5 HENRIETTA STREET 1897\n\n_The Illustrations_ _in this Volume are the copyright of_ SERVICE & PATON, _London_\n\n"
    replace: ""
    count: 1
    note: >-
      Strips this 1897 illustrated edition's publisher imprint (Service
      & Paton, London) and, more importantly, its illustrations-copyright
      notice ("The Illustrations in this Volume are the copyright of
      Service & Paton, London"). docs/review-checklist.md requires the
      text to start with the actual work and no licence text; a
      copyright notice is exactly that, regardless of how public-domain
      the underlying 1847 text is, and it only concerns the illustrations
      (not present as inline markers in this transcription) in any case.
      Brontë's own dedication to Thackeray and her second-edition preface
      immediately follow and are kept.
  - find: "\n\n\nHow dare I, Mrs. Reed? How dare I? Because it is the truth\n\n"
    replace: "\n\n"
    count: 1
    note: >-
      Stray duplicate of nearby dialogue/narration, sitting alone as its own
      paragraph with a wider blank-line gap before it than the corpus's normal
      single-blank-line paragraph break, usually (not always, see below) missing
      the quotation marks or emphasis markup the live text has — the leftover text
      remnant of an illustration caption from this 1897 Townsend-illustrated
      edition, which the plain-text transcription (unlike P&P's, which uses
      explicit [Illustration ...] markers) carries as bare prose rather than a
      recognisable marker. Confirmed against Project Gutenberg's separate HTML
      edition of the same ebook (1260), which places this exact phrase as an image
      caption. Jane's outburst at Mrs. Reed in the red-room aftermath (ch. 4);
      drops the closing dialogue ("You think I have no feelings...") and the
      italics on "truth".
