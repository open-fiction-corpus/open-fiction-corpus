  - find: "\n\n* * * * *\n\n_There’s More to Follow!_\n\nMore stories of the sort you like; more, probably, by the author of this one; more than 500 titles all told by writers of world-wide reputation, in the Authors’ Alphabetical List which you will find on the _reverse side_ of the wrapper of this book. Look it over before you lay it aside. There are books here you are sure to want--some, possibly, that you have _always_ wanted.\n\nIt is a _selected_ list; every book in it has achieved a certain measure of _success_.\n\nThe Grosset & Dunlap list is not only the greatest Index of Good Fiction available, it represents in addition a generally accepted Standard of Value. It will pay you to\n\n_Look on the Other Side of the Wrapper!_\n\n_In case the wrapper is lost write to the publishers for a complete catalog_\n\n* * * * *\n\nDETECTIVE STORIES BY J. S. FLETCHER\n\nMay be had wherever books are sold. Ask for Grosset & Dunlap’s list\n\n\nTHE SECRET OF THE BARBICAN\n\nTHE ANNEXATION SOCIETY\n\nTHE WOLVES AND THE LAMB\n\nGREEN INK\n\nTHE KING versus WARGRAVE\n\nTHE LOST MR. LINTHWAITE\n\nTHE MILL OF MANY WINDOWS\n\nTHE HEAVEN-KISSED HILL\n\nTHE MIDDLE TEMPLE MURDER\n\nRAVENSDENE COURT\n\nTHE RAYNER-SLADE AMALGAMATION\n\nTHE SAFETY PIN\n\nTHE SECRET WAY\n\nTHE VALLEY OF HEADSTRONG MEN\n\n_Ask for Complete free list of G. & D. Popular Copyrighted Fiction_\n\nGROSSET & DUNLAP, _Publishers_, NEW YORK\n"
    replace: "\n"
    count: 1
    note: >-
      Removes trailing Grosset & Dunlap publisher advertising for unrelated
      titles. This reprint edition's back matter is not part of Stoker's
      novel; the story itself ends cleanly at "JONATHAN HARKER." / "THE
      END", which is kept.
