rights:
  status: uncertain
  verified_jurisdictions: [US]
  unverified_jurisdictions: [EU, UK]
  evidence:
    - The work was first published anonymously 1 January 1818, London, in
      three volumes; this transcription reproduces the revised 1831
      single-volume edition (Henry Colburn and Richard Bentley), "REVISED,
      CORRECTED, AND ILLUSTRATED WITH A NEW INTRODUCTION, BY THE AUTHOR."
      Pre-1930 first publication (either edition) places it in the United
      States public domain, and Project Gutenberg distributes ebook 42324
      with a US public-domain clearance.
    - Mary Shelley died 1 February 1851, so life+70 protection expired on
      1 January 1922 in the UK and EU member states. Spain's transitional
      80-year post-mortem term (1879 Act, authors deceased before 7
      December 1987) expired on 1 January 1932, so there is no outstanding
      Article 10 (Directive 2006/116/EC) exception.
    - This edition's front matter includes two distinct pieces, not one.
      Mary Shelley's own 1831 Introduction (her account of the novel's
      origin, signed "M. W. S.") is her own text and is kept. The
      following Preface, dated "Marlow, September, 1817," is not - her
      Introduction explicitly identifies its author a few lines earlier
      ("From this declaration I must except the preface. As far as I can
      recollect, it was entirely written by him," referring to her
      husband Percy Bysshe Shelley) - and is excluded during extraction,
      same category as George Saintsbury's preface excluded from Pride
      and Prejudice. Percy Bysshe Shelley died 23 July 1822, so this
      exclusion is a curation decision about whose text this is, not a
      rights one - his work independently clears every jurisdiction too
      (UK/EU life+70 expired 1892; Spain's transitional term expired
      1902).
    - A faithful transcription with trivial corrections does not meet the
      EU originality threshold for separate protection, and the UK
      typographical-arrangement right does not subsist in a plain-text
      file. The inspected artifact contains no separately rights-bearing
      editorial material once the Preface above is excluded, so no
      separate transcription right is expected for the inspected
      plain-text artifact.
  licence: null
  notes: The underlying 1818/1831 work's US public domain status is
    verified (see evidence above). The same evidence supports UK and EU
    public-domain status too - life+70 and Spain's transitional term both
    expired decades ago, with no outstanding jurisdiction exception - but
    that analysis has not yet had the second maintainer sanity-check, so
    UK and EU stay in unverified_jurisdictions until it does; this notes
    field should not be read as a substitute claim of verification. The
    exact Gutenberg transcription (ebook 42324) has been inspected and
    contains solely Mary Shelley's 1831 Introduction and the novel's text
    plus the excluded Percy Shelley preface (see above), a small printer's
    colophon, and a transcriber's note (both excluded, see overrides) - no
    other third-party introductions, notes, or annotations remain. The
    remaining gate before flipping rights.status to public-domain and
    moving UK/EU into verified_jurisdictions is the second maintainer
    sanity-check, per docs/review-checklist.md. An alternate Gutenberg
    edition (#41445, the 1818 first edition) was considered and set aside
    for a possible future edition-comparison collection rather than
    including both editions of one work in the same pack.

