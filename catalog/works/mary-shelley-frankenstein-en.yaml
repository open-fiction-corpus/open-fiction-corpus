  review_notes: Backlog pick (#20). Prepared from the pinned Gutenberg
    artifact; word count 77,252 against expected_min_words 70000, all 24
    chapters verified present and in order. The title, subtitle "OR, THE
    MODERN PROMETHEUS.", and byline "BY MARY W. SHELLEY." are kept at the
    very start of the body; a credit line, transcriber's
    note, and the publisher imprint that follow are excluded, keeping
    Mary Shelley's 1831 Introduction in full - an earlier override version
    dropped the title/byline along with that boilerplate, caught in
    review and fixed. Percy Bysshe Shelley's 1817 preface is excluded (see
    rights.evidence for the attribution) without re-typing the
    "LETTER I." heading that already follows it in source - an earlier
    version of this override also injected a duplicate heading there,
    caught in review and fixed. Ends cleanly on "THE END." with a trailing
    colophon and transcriber's note excluded. Illustration markers are
    stripped automatically.
    The novel's three verse passages - a footnoted Coleridge quotation
    (ch. 5), an unattributed Percy Bysshe Shelley "Mutability" quotation
    (ch. 10), and a footnoted Wordsworth quotation (ch. 18) - have their
    line breaks restored (fiction_clean_v1 is prose-only by design, per
    docs/cleaning-guide.md). The ASCII em-dash substitution
    (202 instances) is fixed; confirmed zero real em dash characters
    reach the extracted body (2 exist in the raw file but sit in
    Gutenberg's license boilerplate, outside the START/END markers).
    Not yet human-reviewed.
