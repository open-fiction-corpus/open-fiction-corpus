  evidence:
    - The work was serialised in Charles Dickens's "All the Year Round"
      January-August 1868, with book publication in July 1868, London,
      Tinsley Brothers; pre-1930 first publication places it in the
      United States public domain, and Project Gutenberg distributes
      ebook 155 with a US public-domain clearance.
    - Wilkie Collins died on 23 September 1889, so life+70 protection
      expired on 1 January 1960 in the UK and EU member states. Spain's
      transitional 80-year post-mortem term (1879 Act, authors deceased
      before 7 December 1987) expired on 1 January 1970, so there is no
      outstanding Article 10 (Directive 2006/116/EC) exception.
    - A faithful transcription with trivial corrections does not meet the
      EU originality threshold for separate protection, and the UK
      typographical-arrangement right does not subsist in a plain-text
      file. The inspected artifact contains no separately rights-bearing
      editorial material, so no separate transcription right is expected
      for the inspected plain-text artifact.
  licence: null
  notes: The underlying 1868 work's US public domain status is verified
    (see evidence above). The same evidence supports UK and EU
    public-domain status too - life+70 and Spain's transitional term both
    expired decades ago, with no outstanding jurisdiction exception - but
    that analysis has not yet had the second maintainer sanity-check, so
    UK and EU stay in unverified_jurisdictions until it does; this notes
    field should not be read as a substitute claim of verification. The
    exact Gutenberg transcription (ebook 155) has been inspected and
    contains solely Collins's text plus removable Gutenberg boilerplate
    and a generated table of contents (excluded, see overrides) - no
    third-party introductions, notes, or annotations remain. The
    remaining gate before flipping rights.status to public-domain and
    moving UK/EU into verified_jurisdictions is that second maintainer
    sanity-check, per docs/review-checklist.md.

