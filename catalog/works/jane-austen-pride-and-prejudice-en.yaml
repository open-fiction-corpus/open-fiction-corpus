  review_notes: Backlog pick (#18). Prepared from the pinned Gutenberg
    artifact. The 154 inline illustration markers scattered through
    this edition's body (35 individually carrying a "Copyright 1894 by
    George Allen" stamp), previously flagged here as unsolved, are now
    handled generally - gutenberg_txt_v1 strips "[Illustration ...]"
    markup as part of extraction, not as a per-work override, so this
    benefits any future illustrated Gutenberg edition too. 7 of those
    154 markers happen to sit mid-sentence rather than between two real
    paragraphs, which the general step can't safely infer (a
    context-guessing version was tried and reverted - see prepare.py's
    docstring for why that's unsafe as a general rule); it always leaves
    a normal paragraph gap behind instead, correct for the other 147 but
    not these 7, so those are closed explicitly via override, verified
    against the raw source. The Saintsbury
    preface, publisher imprint/copyright, and List of Illustrations
    index are excluded (see overrides); the ASCII em-dash substitution
    and three mis-cased or missing-period chapter headings (XLVI, XIII,
    XIV) are fixed; four archaic spellings unique to this edition
    (manœuvre, develope, ancle, ancles) are modernised via the shared
    rules file; two genuine transcription errors ("Mr, Wickham" for
    "Mr. Wickham"; "often times his consequence" for "of ten times his
    consequence", confirmed against independent editions) are fixed,
    while a third flagged spot, "conversible companion", is confirmed as
    Austen's own word choice and left untouched; two more archaic
    hyphenated forms (good-bye, half-a-dozen) are modernised via the
    shared rules file, added for Jane Eyre's corresponding archaic forms
    and applying here too since they're general rules, not per-work; all
    61 chapters verified present and in order. Not yet human-reviewed.
  reviewed_text_sha256: null

