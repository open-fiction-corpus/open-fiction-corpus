  review_notes: Backlog pick (issue 27), edition 43936 selected over edition
    55 for wording fidelity (see rights.evidence). 153 inline illustration
    markers were audited individually (accounting for the marker-merging
    behavior of _strip_illustration_markers) for mid-sentence risk; 14
    merged spans were not preceded by terminal punctuation and were checked
    by hand against the raw text, breaking down as follows - 8 turned out
    to be dialogue-attribution
    paragraph breaks ("...she said,\n\nQUOTE"), which is this book's own
    established convention throughout (confirmed by grepping the same
    pattern dozens of times elsewhere with no illustration involved), so
    none needed a join override; 4 were 2-line chapter-heading continuations
    (e.g. "The Rescue of\n   the Tin Woodman"), confirmed safe; 1 sat in the
    front-matter block already handled by the copyright/ToC-removal
    override; and 1 was the story's closing asterism scene-break, also
    confirmed safe. Prepared at 39,505 words.
