rights:
  status: uncertain
  verified_jurisdictions: [US]
  unverified_jurisdictions: [EU, UK]
  evidence:
    - First published in 1900, Chicago, George M. Hill Company (the first
      copy came off the press 17 May 1900 - hand-assembled by Baum for his
      sister - with general distribution following in September 1900 after
      copyright registration on 1 August 1900; the exact day is immaterial
      to the rights analysis, which turns only on the year). Pre-1930 first
      publication places it in the United States public domain, and Project
      Gutenberg distributes ebook 43936 with a US public-domain clearance.
    - L. Frank Baum died 6 May 1919, so life+70 protection expired on 1
      January 1990 in the UK and EU member states. Spain's transitional
      80-year post-mortem term (1879 Act, authors deceased before 7
      December 1987) expired on 1 January 2000, so there is no
      outstanding Article 10 (Directive 2006/116/EC) exception.
    - This transcription is a faithful reproduction of the original
      Denslow-illustrated first edition (153 inline illustration markers,
      stripped during extraction per the general Gutenberg
      illustration-marker capability added in (#32) - not accepted into
      the corpus, per docs/review-checklist.md section 1). W. W. Denslow
      died 29 March 1915, so his illustrations are independently public
      domain too (UK/EU life+70 expired 1986; Spain's transitional term
      expired 1996), but that is not why they are excluded - they are
      simply not reproducible in a plain-text file.
    - A faithful transcription with trivial corrections does not meet the
      EU originality threshold for separate protection, and the UK
      typographical-arrangement right does not subsist in a plain-text
      file. The inspected artifact contains no separately rights-bearing
      editorial material, so no separate transcription right is expected
      for the inspected plain-text artifact.
  licence: null
  notes: The underlying 1900 work's US public domain status is verified
    (see evidence above). The same evidence supports UK and EU
    public-domain status too - life+70 and Spain's transitional term both
    expired decades ago, with no outstanding jurisdiction exception - but
    that analysis has not yet had the second maintainer sanity-check, so
    UK and EU stay in unverified_jurisdictions until it does; this notes
    field should not be read as a substitute claim of verification. The
    exact Gutenberg transcription (ebook 43936) has been inspected and
    contains solely Baum's own text (his signed and dated introduction, and
    his dedication, are kept) plus removable production/platform matter -
    the Denslow illustrator credit and publisher imprint on the title
    page, the historical publisher's copyright notice, a generated table
    of contents, the (stripped) illustration markers, a trailing
    transcriber's note, and the closing "End of Project Gutenberg's..."
    line - no third-party introductions, notes, or annotations remain. An
    alternate Gutenberg
    edition (#55) was considered and rejected - direct wording comparison
    shows signs of light modernisation not present here (e.g. "cookstove"
    and "trap door" where this edition has "cooking stove" and
    "trap-door", matching this corpus's own established archaic-hyphen
    conventions), and it lacks the illustrator credit and most of the
    illustration markers this edition preserves. The remaining gate
    before flipping rights.status to public-domain and moving UK/EU into
    verified_jurisdictions is the second maintainer sanity-check, per
    docs/review-checklist.md.

