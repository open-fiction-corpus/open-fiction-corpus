  evidence:
    - The work was first published on 26 May 1897, London, Archibald
      Constable and Company; pre-1930 first publication places it in the
      United States public domain, and Project Gutenberg distributes ebook
      345 with a US public-domain clearance.
    - Bram Stoker died on 20 April 1912, so life+70 protection expired on
      1 January 1983 in the UK and EU member states. Spain's transitional
      80-year post-mortem term (1879 Act, authors deceased before 7 December
      1987) expired on 1 January 1993, so there is no outstanding Article 10
      (Directive 2006/116/EC) exception.
    - A faithful transcription with trivial corrections does not meet the
      EU originality threshold for separate protection, and the UK
      typographical-arrangement right does not subsist in a plain-text
      file. The inspected artifact contains no separately rights-bearing
      editorial material, so no separate transcription right is expected
      for the inspected plain-text artifact.
  licence: null
  notes: The underlying 1897 work is public domain in every reviewed
    jurisdiction. The exact Gutenberg transcription (ebook 345) has been
    inspected and contains solely Stoker's text plus removable Gutenberg
    boilerplate and Grosset & Dunlap publisher front/back matter (a title
    page with copyright notice, and several pages of advertising for
    unrelated titles) - no third-party introductions, notes, or
    annotations; that publisher matter is excluded during extraction, the
    same as Gutenberg boilerplate. The remaining gate before flipping to
    public-domain (with US, UK, and EU all verified, no jurisdiction
    carve-out) is the second maintainer sanity-check of this rights
    section, per docs/review-checklist.md.

