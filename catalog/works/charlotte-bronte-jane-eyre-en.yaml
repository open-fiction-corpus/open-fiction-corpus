rights:
  status: uncertain
  verified_jurisdictions: [US]
  unverified_jurisdictions: [EU, UK]
  evidence:
    - The work was first published 16 October 1847, London, Smith, Elder
      & Co., under the pseudonym "Currer Bell"; pre-1930 first publication
      places it in the United States public domain, and Project Gutenberg
      distributes ebook 1260 with a US public-domain clearance.
    - Charlotte Brontë died on 31 March 1855, so life+70 protection
      expired on 1 January 1926 in the UK and EU member states. Spain's
      transitional 80-year post-mortem term (1879 Act, authors deceased
      before 7 December 1987) expired on 1 January 1936, so there is no
      outstanding Article 10 (Directive 2006/116/EC) exception.
    - A faithful transcription with trivial corrections does not meet the
      EU originality threshold for separate protection, and the UK
      typographical-arrangement right does not subsist in a plain-text
      file. The inspected artifact contains no separately rights-bearing
      editorial material, so no separate transcription right is expected
      for the inspected plain-text artifact.
  licence: null
  notes: The underlying 1847 work's US public domain status is verified
    (see evidence above). The same evidence supports UK and EU
    public-domain status too - life+70 and Spain's transitional term both
    expired decades ago, with no outstanding jurisdiction exception - but
    that analysis has not yet had the second maintainer sanity-check, so
    UK and EU stay in unverified_jurisdictions until it does; this notes
    field should not be read as a substitute claim of verification. The
    exact Gutenberg transcription (ebook 1260) has been inspected and
    contains solely Brontë's text (her own dedication to Thackeray and
    second-edition preface are hers, not third-party apparatus, and are
    kept) plus removable Gutenberg boilerplate and this 1897 Service &
    Paton edition's publisher imprint and illustrations-copyright notice
    (excluded, see overrides) - no third-party introductions, notes, or
    annotations remain. The remaining gate before flipping rights.status
    to public-domain and moving UK/EU into verified_jurisdictions is that
    second maintainer sanity-check, per docs/review-checklist.md.

