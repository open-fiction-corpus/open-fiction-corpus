  reviewed_by: []
  review_notes: Backlog pick (#19). Prepared from the pinned Gutenberg
    artifact; word count 185,284 against expected_min_words 180000, all
    38 chapters verified present and in order (the last, "CHAPTER
    XXXVIII—CONCLUSION", correctly carries its dual heading from the
    source). The text starts with the actual work - title, Brontë's
    dedication to Thackeray, her second-edition preface - with the 1897
    Service & Paton edition's publisher imprint and illustrations-
    copyright notice excluded (see overrides). This transcription carries
    no [Illustration ...] markers, but it does carry the illustrations'
    captions themselves as bare, unmarked duplicate paragraphs scattered
    through the body (confirmed against Gutenberg's separate HTML
    edition of the same ebook, which places each exact phrase as an
    image caption); all 13 found are excluded via override. The corpus's
    five short verse/song quotations in this novel (Bewick's Thomson
    excerpt, Bessie's two songs, a Scott couplet, and the opening of
    Scott's "Marmion") had their line breaks flattened by
    fiction_clean_v1, which is prose-only by design - restored via
    override, scoped to this work rather than a pipeline change, since
    it's a handful of short quotations rather than substantial lineated
    content. Several archaic hyphenated forms (good-bye, good-night,
    good-morning, good-afternoon, half-an-hour, half-a-dozen,
    half-a-slice, every-day) and encyclopædic (de-ligature) are
    modernised via the shared rules file. Automated and preliminary
    content checks are complete; awaiting the maintainer's full human
    read-through, reviewed_by, and reviewed_text_sha256.
  reviewed_text_sha256: null

