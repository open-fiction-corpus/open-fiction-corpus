  review_notes: Backlog pick (#29). Prepared from the pinned Gutenberg
    artifact (ebook 120, the Louis Rhead 1915 Harper &amp; Brothers
    illustrated edition, per Gutenberg's own catalogue attribution);
    word count 68,014 against expected_min_words 65000. A second
    Gutenberg edition (#27780, a 2002 Gramercy Books reprint) was
    considered and rejected - it carries a separately copyrighted 1986
    foreword and modern publisher matter this edition avoids. No
    third-party matter needed excluding from (#120) itself - the text
    starts with Stevenson's own dedication and verse address to the
    reader and ends cleanly on the novel's real final line. A generated
    table of contents (found on closer inspection, despite an earlier
    scan missing it) is removed via override, along with the ASCII em-dash
    substitution (427 instances; one already-correct real em dash, a
    deliberate redacted-year device, is left untouched). Two verse
    passages have their line breaks restored (fiction_clean_v1 is
    prose-only by design, per docs/cleaning-guide.md) - the opening "To
    the Hesitating Purchaser" dedication poem, and the "Fifteen men on
    the dead man's chest" sea-song, which recurs 6 times in varying
    forms (4 needed restoring; 2 were already correctly split across
    dialogue and needed no fix). Not yet human-reviewed.
