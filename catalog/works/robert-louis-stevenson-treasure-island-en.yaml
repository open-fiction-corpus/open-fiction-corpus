rights:
  status: uncertain
  verified_jurisdictions: [US]
  unverified_jurisdictions: [EU, UK]
  evidence:
    - First published as a book 14 November 1883, London, Cassell and
      Company (after serialisation in Young Folks, 1881-82, under the
      pseudonym "Captain George North"); pre-1930 first publication places
      it in the United States public domain, and Project Gutenberg
      distributes ebook 120 with a US public-domain clearance.
    - Robert Louis Stevenson died 3 December 1894, so life+70 protection
      expired on 1 January 1965 in the UK and EU member states. Spain's
      transitional 80-year post-mortem term (1879 Act, authors deceased
      before 7 December 1987) expired on 1 January 1975, so there is no
      outstanding Article 10 (Directive 2006/116/EC) exception.
    - A faithful transcription with trivial corrections does not meet the
      EU originality threshold for separate protection, and the UK
      typographical-arrangement right does not subsist in a plain-text
      file. The inspected artifact contains no separately rights-bearing
      editorial material, so no separate transcription right is expected
      for the inspected plain-text artifact.
  licence: null
  notes: The underlying 1883 work's US public domain status is verified
    (see evidence above). The same evidence supports UK and EU
    public-domain status too - life+70 and Spain's transitional term both
    expired decades ago, with no outstanding jurisdiction exception - but
    that analysis has not yet had the second maintainer sanity-check, so
    UK and EU stay in unverified_jurisdictions until it does; this notes
    field should not be read as a substitute claim of verification. The
    exact Gutenberg transcription (ebook 120) has been inspected and
    contains solely Stevenson's own text (his dedication "To S.L.O." and
    the verse dedication "To the Hesitating Purchaser" are his own, kept)
    plus removable Gutenberg boilerplate - a generated table of contents
    is present and excluded (see overrides), but there are no
    third-party introductions, notes, or annotations, no illustration
    markers, and no leaked captions. An alternate Gutenberg edition
    (#27780, a 2002 Gramercy Books reprint) was considered and rejected -
    it carries a separately copyrighted 1986 foreword and modern
    publisher matter that would need excluding, a harder problem than
    this edition's plain generated ToC. The remaining gate before
    flipping rights.status to public-domain and moving UK/EU into
    verified_jurisdictions is the second maintainer sanity-check, per
    docs/review-checklist.md.

