name: general-fiction
description: Curated, genre-diverse human-authored fiction suitable for general prose continued pretraining.
version: 0.1.0
filters:
  language: en
  forms: [novel, novella, short-story, short-story-collection]
  quality_status: [human-reviewed]
  origin: [human]
exclude_flags: [uncertain-rights, severe-ocr-errors, incomplete, abridged]
selection:
  max_works_per_author: 3
