name: Release dataset

# Publishes versioned dataset artifacts to the Hugging Face dataset
# repository. Runs on published GitHub releases, or manually with dry_run
# to rehearse everything except the upload.
#
# One-time setup before the first real release:
#   1. Create the Hugging Face dataset repository and its dataset card
#      (see docs/hugging-face.md and docs/dataset-card-template.md).
#   2. Set the repository variable HF_DATASET_REPO to the dataset id,
#      open-fiction-corpus/corpus.
#   3. Configure auth, preferring trusted publishing: in the HF dataset's
#      Settings -> Trusted Publishers, add a GitHub Actions publisher with
#      claims pinned to this repository and workflow (release.yml). Do NOT
#      pin the branch claim: release- and tag-triggered runs do not carry a
#      branch ref, so a branch-pinned publisher would reject them. Until
#      trusted publishing is configured, a narrowly scoped token in the
#      HF_TOKEN secret works as a fallback.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build and verify everything but skip the Hugging Face upload
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # OIDC token for Hugging Face trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: pytest
      - run: ofc validate

      # TODO(source adapters): fetch the pinned upstream sources and produce
      # cleaned texts under workspace/clean/ before building. Until adapters
      # exist, the build tolerates missing texts and the guard below refuses
      # to publish a release with zero rows.
      - name: Build whole-catalogue export
        run: ofc build --allow-missing-text

      - name: Build pack exports
        run: |
          python - <<'EOF'
          import pathlib
          import subprocess
          import yaml

          for path in sorted(pathlib.Path("packs").rglob("*.yaml")):
              name = yaml.safe_load(path.read_text(encoding="utf-8"))["name"]
              subprocess.run(
                  ["ofc", "build", "--pack", name, "--allow-missing-text"],
                  check=True,
              )
          EOF

      - name: Assemble release directory
        run: >
          python scripts/assemble_release.py
          --version "${{ github.event.release.tag_name || github.ref_name }}"
          --commit "${{ github.sha }}"

      - name: Refuse to publish an empty dataset
        if: ${{ github.event_name == 'release' || inputs.dry_run == false }}
        run: |
          python - <<'EOF'
          import json
          import sys

          manifest = json.load(open("dist/release/release/build-manifest.json"))
          rows = sum(entry["row_count"] for entry in manifest["files"].values())
          if rows == 0:
              sys.exit(
                  "The built dataset contains zero rows; refusing to publish. "
                  "Cleaned texts must be available before a real release."
              )
          print(f"Dataset contains {rows} row(s); OK to publish.")
          EOF

      - name: Upload release directory as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dataset-release
          path: dist/release

      - name: Publish to Hugging Face
        if: ${{ github.event_name == 'release' || inputs.dry_run == false }}
        env:
          # Fallback auth only; leave the secret unset when trusted
          # publishing is configured.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ vars.HF_DATASET_REPO }}
          # Trusted publishing: on GitHub Actions the hf CLI
          # (huggingface_hub >= 1.19.0) performs the OIDC token exchange
          # automatically when HF_OIDC_RESOURCE is set. The resource needs
          # the datasets/ prefix; the upload target does not.
          HF_OIDC_RESOURCE: datasets/${{ vars.HF_DATASET_REPO }}
          RELEASE_VERSION: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          if [ -z "$HF_DATASET_REPO" ]; then
            echo "Repository variable HF_DATASET_REPO is not set; cannot publish." >&2
            exit 1
          fi
          curl -LsSf https://hf.co/cli/install.sh | bash
          export PATH="$HOME/.local/bin:$PATH"
          hf upload "$HF_DATASET_REPO" dist/release . \
            --repo-type dataset \
            --commit-message "Release $RELEASE_VERSION from catalogue commit $GITHUB_SHA"
